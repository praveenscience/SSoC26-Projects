name: Validate Projects JSON

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  validate:
    name: Validate JSON Structure and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Validator
        run: node .github/scripts/validate.js
